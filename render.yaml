services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
- type: pserv
  name: expense-db
  plan: free

  # ── MCP Web Service ────────────────────────────────────────────────────────
  - type: web
    name: expense-mcp-server
    plan: free
    runtime: python
    region: singapore

    buildCommand: pip install -r requirements.txt
    startCommand: python run.py

    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: TRANSPORT
        value: streamable-http

      - key: HOST
        value: 0.0.0.0

      - key: PORT
        value: 10000

      - key: MCP_SERVER_NAME
        value: Expense Tracker

      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
