# render.yaml — Expense MCP Server
# Blueprint spec: https://render.com/docs/blueprint-spec
#
# IMPORTANT: Render Postgres databases must be defined under the top-level
# `databases:` key, NOT inside `services:`. The `type: pserv` value means
# "private app service" — it is NOT PostgreSQL.

# ── Web Services ───────────────────────────────────────────────────────────────
services:
  - type: web
    name: expense-mcp-server
    runtime: docker          # Use the Dockerfile (handles psycopg2/libpq cleanly)
    plan: free
    region: singapore

    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: TRANSPORT
        value: streamable-http

      - key: HOST
        value: 0.0.0.0

      - key: PORT
        value: 10000

      - key: MCP_SERVER_NAME
        value: Expense Tracker

      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString

# ── PostgreSQL Databases ───────────────────────────────────────────────────────
# Render Postgres must be defined here, under `databases:` — never in `services:`
databases:
  - name: expense-db
    plan: free
    region: singapore